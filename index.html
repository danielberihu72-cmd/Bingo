<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ላዝ ቢንጎ - ሩም</title>
    <script src="https://telegram.org"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d0e15;
            color: #00f0ff;
            margin: 0;
            padding: 10px;
        }
        
        /* የደብተሩ የላይኛው ሳጥኖች (Header) */
        .header-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            margin-bottom: 15px;
        }
        .header-box {
            background: #161925;
            border: 1px solid #ff00ff;
            border-radius: 6px;
            padding: 8px 2px;
            text-align: center;
            box-shadow: 0 0 5px rgba(255, 0, 255, 0.2);
        }
        .box-title {
            font-size: 11px;
            color: #ff00ff;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .box-value {
            font-size: 13px;
            font-weight: bold;
            color: #fff;
        }

        /* የመካከለኛው ትልቅ የካርቴላዎች ማውጫ ሳጥን */
        .main-container {
            background: rgba(0, 240, 255, 0.02);
            border: 2px solid #00f0ff;
            border-radius: 8px;
            padding: 10px;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.1);
        }
        .container-title {
            font-size: 14px;
            color: #00f0ff;
            margin-bottom: 10px;
            font-weight: bold;
            text-align: left;
        }

        /* የካርቴላዎች ዝርዝር ረድፍ (List View) */
        .cards-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }
        .card-row {
            background: #161925;
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 6px;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .card-row:active {
            background: #ff00ff;
            border-color: #ff00ff;
            transform: scale(0.98);
        }
        .card-number {
            font-size: 16px;
            font-weight: bold;
            color: #fff;
        }
        .card-status {
            font-size: 12px;
            color: #00f0ff;
            background: rgba(0, 240, 255, 0.1);
            padding: 2px 8px;
            border-radius: 10px;
        }
        .card-row:active .card-status {
            color: #fff;
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <!-- የላይኛው የመረጃ ሳጥኖች ክፍል -->
    <div class="header-grid">
        <div class="header-box">
            <div class="box-title">Room</div>
            <div class="box-value">አዲስ ሩም</div>
        </div>
        <div class="header-box">
            <div class="box-title">Sold</div>
            <div class="box-value">00</div>
        </div>
        <div class="header-box">
            <div class="box-title">Time</div>
            <div class="box-value">3:05</div>
        </div>
        <div class="header-box">
            <div class="box-title">Balance</div>
            <div class="box-value">0.00</div>
        </div>
    </div>

    <!-- የመካከለኛው የካርቴላዎች ማውጫ ክፍል -->
    <div class="main-container">
        <div class="container-title">📋 የካርቴላዎች ማውጫ (1 - 200)</div>
        <div class="cards-list" id="cardsList">
            <!-- የካርቴላ ረድፎች በጃቫስክሪፕት እዚህ ይገባሉ -->
        </div>
    </div>

    <script>
        const cardsList = document.getElementById('cardsList');
        
        // ከ 1 እስከ 200 የካርቴላ ረድፎችን በቅደም ተከተል መፍጠር
        for (let i = 1; i <= 200; i++) {
            const row = document.createElement('div');
            row.className = 'card-row';
            
            // የካርቴላ ቁጥር እና ሁኔታ መፍጠሪያ
            row.innerHTML = `
                <div class="card-number">ካርቴላ ቁጥር ${i}</div>
                <div class="card-status">ክፈት 🎰</div>
            `;
            
            // ተጫዋቹ ረድፉን ሲነካ ወደ ጨዋታው ሰሌዳ የሚወስድ ተግባር
            row.onclick = function() {
                // እዚህ ላይ ወደ ጨዋታው ገጽ የመክፈት ወይም የማስተላለፍ ተግባር መጻፍ ይቻላል
                alert(`ካርቴላ ቁጥር ${i} እየተከፈተ ነው...`);
            };
            
            cardsList.appendChild(row);
        }
    </script>
</body>
</html>
