<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ላዝ ቢንጎ - ቪአይፒ</title>
    <script src="https://telegram.org"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d0e15;
            color: #00f0ff;
            margin: 0;
            padding: 10px;
            overflow-x: hidden;
        }
        
        /* --- 1. ገጽ 1፦ የካርቴላዎች ማውጫ እና የሰዓት ቆጠራ ሳጥን --- */
        #selectionPage {
            display: block;
        }
        .header-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            margin-bottom: 15px;
        }
        .header-box {
            background: #161925;
            border: 1px solid #ff00ff;
            border-radius: 6px;
            padding: 8px 2px;
            text-align: center;
        }
        .box-title { font-size: 11px; color: #ff00ff; margin-bottom: 4px; }
        .box-value { font-size: 13px; font-weight: bold; color: #fff; }
        
        /* የ 30 ሰከንድ መቆጠሪያ ብቅ ባይ ሳጥን ስታይል */
        .waiting-overlay {
            display: none;
            background: rgba(13, 14, 21, 0.95);
            border: 2px solid #ff00ff;
            box-shadow: 0 0 20px #ff00ff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            text-align: center;
        }
        .waiting-timer {
            font-size: 48px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 15px #ff00ff;
            margin: 10px 0;
        }

        .main-container {
            background: rgba(0, 240, 255, 0.02);
            border: 2px solid #00f0ff;
            border-radius: 8px;
            padding: 10px;
        }
        .container-title { font-size: 14px; color: #00f0ff; margin-bottom: 10px; font-weight: bold; text-align: left; }
        .cards-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 400px;
            overflow-y: auto;
        }
        .card-row {
            background: #161925;
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 6px;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .card-row:active { background: #ff00ff; border-color: #ff00ff; }
        .card-number { font-size: 14px; font-weight: bold; color: #fff; }
        .card-status { font-size: 11px; color: #00f0ff; background: rgba(0, 240, 255, 0.1); padding: 2px 8px; border-radius: 10px; }

        /* --- 2. ገጽ 2፦ ዋናው የጨዋታ ሜዳ ስታይል --- */
        #gamePage {
            display: none;
        }
        .game-header {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            margin-bottom: 10px;
        }
        .game-header-box {
            background: #161925;
            border: 1px solid #00f0ff;
            border-radius: 6px;
            padding: 6px 2px;
            text-align: center;
        }
        .game-layout {
            display: flex;
            gap: 8px;
            align-items: flex-start;
        }
        
        /* የግራ ክፍል (1-75) */
        .left-numbers {
            flex: 2.5;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 6px;
            padding: 4px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 3px;
            max-height: 380px;
            overflow-y: auto;
        }
        .num-slot {
            background: #11131c;
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #555;
            font-size: 11px;
            padding: 3px 0;
            border-radius: 3px;
            text-align: center;
        }
        .num-slot.called {
            background: #00f0ff;
            color: #000;
            font-weight: bold;
            box-shadow: 0 0 5px #00f0ff;
        }

        /* የመሃል ክፍል (Playing Cartela) */
        .center-cartela {
            flex: 5;
        }
        .bingo-letters {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 3px;
            font-weight: bold;
            color: #ff00ff;
            text-align: center;
            font-size: 14px;
            margin-bottom: 3px;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 3px;
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid #00f0ff;
            border-radius: 6px;
            padding: 4px;
        }
        .cell {
            background: #161925;
            border: 1px solid rgba(0, 240, 255, 0.2);
            color: #fff;
            border-radius: 3px;
            padding: 12px 0;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
        }
        .cell.marked {
            background: #ff00ff;
            border-color: #ff00ff;
            box-shadow: 0 0 8px #ff00ff;
        }

        /* የቀኝ ክፍል (Random Number) */
        .right-display {
            flex: 2.5;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }
        .random-circle {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 3px solid #00f0ff;
            box-shadow: 0 0 10px #00f0ff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            color: #fff;
            background: #161925;
        }
        .btn-bingo {
            background: #ff00ff;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 4px;
            padding: 10px 5px;
            font-size: 11px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 0 8px #ff00ff;
        }
    </style>
</head>
<body>

    <!-- ================= ገጽ 1፦ የካርቴላ መምረጫ ================= -->
    <div id="selectionPage">
        <div class="header-grid">
            <div class="header-box"><div class="box-title">Room</div><div class="box-value">ላዝ ሩም</div></div>
            <div class="header-box"><div class="box-title">Sold</div><div class="box-value" id="soldCount">00</div></div>
            <div class="header-box"><div class="box-title">Time</div><div class="box-value">3:05</div></div>
            <div class="header-box"><div class="box-title">Balance</div><div class="box-value">0.00</div></div>
        </div>

        <!-- የ 30 ሰከንድ መጠበቂያ ሳጥን (ቁጥር ሲመረጥ የሚከፈት) -->
        <div class="waiting-overlay" id="waitingOverlay">
            <div style="font-size: 14px; color: #ff00ff; font-weight: bold;">⏳ ጨዋታው ሊጀምር ነው! እባክዎ ይጠብቁ...</div>
            <div id="selectedInfo" style="font-size:12px; color:#fff; margin-top:5px;"></div>
            <div class="waiting-timer" id="waitingTimer">30</div>
            <div style="font-size: 11px; color: #888;">ሌሎች ተጫዋቾች እየገቡ ነው</div>
        </div>

        <div class="main-container" id="cardsTableContainer">
            <div class="container-title">📋 የካርቴላዎች ማውጫ (1 - 200)</div>
            <div class="cards-list" id="cardsList"></div>
        </div>
    </div>

    <!-- ================= ገጽ 2፦ ዋናው የጨዋታ ሜዳ ================= -->
    <div id="gamePage">
        <div class="game-header">
            <div class="game-header-box"><div class="box-title">ደራሽ</div><div class="box-value">88 ETB</div></div>
            <div class="game-header-box"><div class="box-title">ተጫዋቾች</div><div class="box-value">12</div></div>
            <div class="game-header-box"><div class="box-title">Balls</div><div class="box-value" id="ballCount">00/75</div></div>
        </div>

        <div class="game-layout">
            <!-- የግራ ክፍል (1-75 ዝርዝር) -->
            <div class="left-numbers" id="leftNumbersBoard"></div>

            <!-- የመሃል ክፍል (Playing Cartela) -->
            <div class="center-cartela">
                <div id="selectedCardTitle" style="font-size:12px; color:#00f0ff; margin-bottom:5px; font-weight:bold; text-align:left;"></div>
                <div class="bingo-letters">
                    <div>B</div><div>I</div><div>N</div><div>G</div><div>O</div>
                </div>
                <div class="grid-container" id="cardGrid"></div>
            </div>

            <!-- የቀኝ ክፍል (እጣ የወጣው ቁጥር እና ቢንጎ ቁልፍ) -->
            <div class="right-display">
                <div style="font-size:11px; color:#00f0ff; text-align:center;">የወጣው እጣ</div>
                <div class="random-circle" id="luckyNumber">-</div>
                <button class="btn-bingo" onclick="claimBingo()">🏆 ቢንጎ!</button>
            </div>
        </div>
    </div>

    <script>
        const selectionPage = document.getElementById('selectionPage');
        const gamePage = document.getElementById('gamePage');
        const cardsList = document.getElementById('cardsList');
        const leftNumbersBoard = document.getElementById('leftNumbersBoard');
        const cardGrid = document.getElementById('cardGrid');
        const luckyNumberDisplay = document.getElementById('luckyNumber');
        const ballCountDisplay = document.getElementById('ballCount');
        const selectedCardTitle = document.getElementById('selectedCardTitle');
        const waitingOverlay = document.getElementById('waitingOverlay');
        const waitingTimerDisplay = document.getElementById('waitingTimer');
        const selectedInfo = document.getElementById('selectedInfo');
        const soldCountDisplay = document.getElementById('soldCount');
