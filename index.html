<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ስጦታ ቢንጎ</title>
    <script src="https://telegram.org"></script>
    <style>
        body { background-color: #15202b; color: white; font-family: sans-serif; margin: 0; padding: 10px; text-align: center; }
        .header { display: flex; justify-content: space-around; background: #192734; padding: 10px; font-size: 11px; border-radius: 5px; margin-bottom: 10px; }
        .header div span { display: block; font-weight: bold; font-size: 13px; }
        .balance-color { color: #00ba7c; }
        
        .ball-display { margin: 10px auto; width: 70px; height: 70px; background: #1d9bf0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; box-shadow: 0 0 15px rgba(29,155,240,0.5); }
        .status { margin-bottom: 15px; font-size: 13px; color: #8899a6; }

        h3 { margin: 10px 0 5px 0; font-size: 14px; color: #f1c40f; text-align: left; padding-left: 10px; }
        .board-container { display: flex; max-width: 500px; margin: 0 auto 20px auto; border: 2px solid #38444d; border-radius: 8px; overflow: hidden; opacity: 0.8; }
        .col { flex: 1; display: flex; flex-direction: column; }
        .col-header { padding: 5px 0; font-weight: bold; font-size: 14px; color: white; text-align: center; }
        .b-h { background: #1d9bf0; } .i-h { background: #e0245e; } .n-h { background: #f45d22; } .g-h { background: #00ba7c; } .o-h { background: #794bc4; }
        .cell { height: 25px; display: flex; align-items: center; justify-content: center; border: 1px solid #38444d; font-size: 11px; background: #15202b; font-weight: bold; }
        .board-drawn { background: #2c3e50 !important; color: #8899a6 !important; text-decoration: line-through; }

        .player-card-title { font-size: 16px; color: #00ba7c; margin-top: 15px; font-weight: bold; }
        .player-card { display: grid; grid-template-columns: repeat(5, 1fr); max-width: 350px; margin: 10px auto; gap: 5px; background: #192734; padding: 10px; border-radius: 10px; border: 2px solid #00ba7c; }
        .p-cell { height: 55px; background: #22303c; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; color: white; cursor: pointer; border: 1px solid #38444d; transition: all 0.2s; }
        .p-free { background: #e74c3c !important; color: white; font-size: 12px; }
        .p-marked { background: #00ba7c !important; color: white; transform: scale(0.95); box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }

        .bingo-btn { width: 100%; max-width: 350px; background: #f1c40f; color: #15202b; border: none; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 8px; margin: 20px auto; cursor: pointer; box-shadow: 0 4px 15px rgba(241,196,15,0.4); transition: background 0.2s; }
        .bingo-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <h2 style="margin: 5px 0; font-size: 18px; color: #f1c40f;">🎰 ስጦታ ቢንጎ 🎰</h2>
    
    <div class="header">
        <div>ደራሽ <span class="balance-color">88 ETB</span></div>
        <div>ታክስ <span>20%</span></div>
        <div>የወጡ 🔴 <span id="ball-count">0/75</span></div>
        <div>ተጫዋቾች 👥 <span>12</span></div>
    </div>

    <div class="ball-display" id="current-ball">⏳</div>
    <div class="status" id="game-status">ጨዋታው በሂደት ላይ ነው... የእርስዎን ካርቴላ ይከታተሉ!</div>

    <h3>📋 የዕጣ ሰሌዳ (ከ1-75)</h3>
    <div class="board-container">
        <div class="col"><div class="col-header b-h">B</div><div id="cells-b"></div></div>
        <div class="col"><div class="col-header i-h">I</div><div id="cells-i"></div></div>
        <div class="col"><div class="col-header n-h">N</div><div id="cells-n"></div></div>
        <div class="col"><div class="col-header g-h">G</div><div id="cells-g"></div></div>
        <div class="col"><div class="col-header o-h">O</div><div id="cells-o"></div></div>
    </div>

    <div class="player-card-title">💳 የእርስዎ የጨዋታ ካርቴላ</div>
    <p style="font-size: 11px; color: #8899a6; margin: 0;">የወጣ ቁጥር ካርቴላዎ ላይ ካለ በመንካት ያጥፉት</p>
    <div class="player-card" id="my-card"></div>

    <button class="bingo-btn" onclick="checkBingoClaim()">🏆 ቢንጎ! (አሸነፍኩ) 🏆</button>

    <script>
        const groups = {
            'b': Array.from({length: 15}, (_, i) => i + 1),
            'i': Array.from({length: 15}, (_, i) => i + 16),
            'n': Array.from({length: 15}, (_, i) => i + 31),
            'g': Array.from({length: 15}, (_, i) => i + 46),
            'o': Array.from({length: 15}, (_, i) => i + 61)
        };

        for (let letter in groups) {
            const container = document.getElementById(`cells-${letter}`);
            groups[letter].forEach(num => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `board-num-${num}`;
                cell.innerText = num;
                container.appendChild(cell);
            });
        }

        const myCardNumbers = [
            randomSample(1, 15, 5),
            randomSample(16, 30, 5),
            randomSample(31, 45, 5),
            randomSample(46, 60, 5),
            randomSample(61, 75, 5)
        ];

        function randomSample(min, max, count) {
            let arr = Array.from({length: max - min + 1}, (_, i) => i + min);
            return arr.sort(() => 0.5 - Math.random()).slice(0, count);
        }

        const myCardContainer = document.getElementById('my-card');
        for (let row = 0; row < 5; row++) {
            for (let col = 0; col < 5; col++) {
                const pCell = document.createElement('div');
                pCell.className = 'p-cell';
                
                if (col === 2 && row === 2) {
                    pCell.classList.add('p-free');
                    pCell.innerText = "FREE";
                    pCell.dataset.marked = "true";
                } else {
                    let num = myCardNumbers[col][row];
                    pCell.innerText = num;
                    pCell.id = `player-num-${num}`;
                    pCell.dataset.marked = "false";
                    pCell.dataset.num = num;
                    
                    pCell.onclick = function() {
                        if (pCell.classList.contains('p-marked')) {
                            pCell.classList.remove('p-marked');
                            pCell.dataset.marked = "false";
                        } else {
                            pCell.classList.add('p-marked');
                            pCell.dataset.marked = "true";
                        }
                    };
                }
                myCardContainer.appendChild(pCell);
            }
        }

        let pool = Array.from({length: 75}, (_, i) => i + 1);
        let gameDrawnNumbers = []; 
        let drawnCount = 0;

        function drawBall() {
            if (pool.length === 0) {
                document.getElementById('game-status').innerText = "🏁 ጨዋታው ተጠናቋል!";
                return;
            }
            
            let randomIndex = Math.floor(Math.random() * pool.length);
            let num = pool[randomIndex];
            pool.splice(randomIndex, 1);
            gameDrawnNumbers.push(num); 
            drawnCount++;

            let letter = num <= 15 ? 'B' : num <= 30 ? 'I' : num <= 45 ? 'N' : num <= 60 ? 'G' : 'O';

            document.getElementById('current-ball').innerText = `${letter}-${num}`;
            document.getElementById('ball-count').innerText = `${drawnCount}/75`;

            const activeBoardCell = document.getElementById(`board-num-${num}`);
            if (activeBoardCell) activeBoardCell.classList.add('board-drawn');
        }

        function checkBingoClaim() {
            const cells = Array.from(myCardContainer.children);
            let cardMatrix = [];
            for (let i = 0; i < 5; i++) {
                cardMatrix.push(cells.slice(i * 5, (i + 1) * 5));
            }
            let isWon = false;

            for (let r = 0; r < 5; r++) {
                let rowComplete = true;
                for (let c = 0; c < 5; c++) {
                    let cell = cardMatrix[r][c];
                    if (cell.dataset.marked !== "true" || (cell.dataset.num && !gameDrawnNumbers.includes(parseInt(cell.dataset.num)))) rowComplete = false;
                }
                if (rowComplete) isWon = true;
            }

            for (let c = 0; c < 5; c++) {
                let colComplete = true;
                for (let r = 0; r < 5; r++) {
                    let cell = cardMatrix[r][c];
                    if (cell.dataset.marked !== "true" || (cell.dataset.num && !gameDrawnNumbers.includes(parseInt(cell.dataset.num)))) colComplete = false;
                }
                if (colComplete) isWon = true;
            }

            let diag1 = true, diag2 = true;
            for (let i = 0; i < 5; i++) {
                let cell1 = cardMatrix[i][i];
                if (cell1.dataset.marked !== "true" || (cell1.dataset.num && !gameDrawnNumbers.includes(parseInt(cell1.dataset.num)))) diag1 = false;
                let cell2 = cardMatrix[i][4 - i];
                if (cell2.dataset.marked !== "true" || (cell2.dataset.num && !gameDrawnNumbers.includes(parseInt(cell2.dataset.num)))) diag2 = false;
            }
            if (diag1 || diag2) isWon = true;

            if (isWon) {
                alert("🎉🎉🎉 ቢንጎ!!! 🎉🎉🎉\nእንኳን ደስ አለዎት! ጨዋታውን በተሳካ ሁኔታ አሸንፈዋል። 🏆");
                Telegram.WebApp.close();
            } else {
                alert("❌ ገና አልጨረሱም!\nእባክዎ ትክክለኛ የቢንጎ መስመር እስኪሞላልዎት ድረስ እጣዎችን መከታተልዎን ይቀጥሉ።");
            }
        }

        setInterval(drawBall, 4000);
        Telegram.WebApp.ready();
    </script>
</body>
</html>
